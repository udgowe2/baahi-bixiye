services:
  app:
    image: ghcr.io/udgowe2/baahi-bixiye:latest
    container_name: baahi-app
    restart: unless-stopped
    ports:
      - "8095:3001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DB_HOST: 192.168.1.30
      DB_PORT: "3447"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: Baahi
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads

volumes:
  uploads:
