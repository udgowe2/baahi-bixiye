services:
  app:
    image: ghcr.io/udgowe2/baahi-bixiye:latest
    container_name: baahi-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: baahi
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: Baahi
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: baahi-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: Baahi
      MARIADB_USER: baahi
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  uploads:
  dbdata:
